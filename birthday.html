<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #c8a2c8, #e6ccff);
    text-align: center;
    overflow: hidden;
    transition: 1s;
}

/* dim mode */
.dimmed {
    background: linear-gradient(135deg, #222020, #000000) !important;
    color: white;
}

h1 {
    margin-top: 30px;
    font-size: 2.8em;
    color: #6a1b9a;
}

p {
    font-size: 1.2em;
    max-width: 600px;
    margin: auto;
    color: #ffffff;
}

/* 🎂 Cake */
.cake {
    position: relative;
    margin: 60px auto;
    width: 200px;
    height: 180px;
    cursor: pointer;
}

/* cake layers */
.layer.bottom {
    position: absolute;
    bottom: 0;
    width: 200px;
    height: 70px;
    background: #6b2f2f;
    border-radius: 12px;
    box-shadow: inset 0 -6px 10px rgba(0,0,0,0.3);
}

.layer.top {
    position: absolute;
    bottom: 70px;
    left: 15px;
    width: 170px;
    height: 60px;
    background: #8b3a3a;
    border-radius: 12px;
}

/* name on cake */
.cake-name {
    position: absolute;
    top: 35px;
    width: 100%;
    text-align: center;
    font-weight: bold;
    color: white;
    font-size: 1.1em;
}

/* candles */
.candle {
    position: absolute;
    width: 10px;
    height: 35px;
    background: white;
    border-radius: 3px;
    top: 20px;
}

/* candle positions */
.c1 { left: 40px; }
.c2 { left: 90px; }
.c3 { left: 140px; }

/* flame */
.flame {
    width: 10px;
    height: 12px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -12px;
    animation: flicker 0.3s infinite alternate;
}

.flame.off {
    display: none;
}

@keyframes flicker {
    from { transform: scale(1); opacity: 0.8; }
    to { transform: scale(1.2); opacity: 1; }
}

/* button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #7b1fa2;
    color: white;
    font-size: 1.1em;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

/* hidden message */
.hidden-message {
    display: none;
    margin-top: 20px;
    font-size: 1.3em;
    color: #6a1b9a;
}

/* confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 12px;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* fireworks */
.firework {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(15); opacity: 0; }
}

/* sparkles */
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: sparkleAnim linear forwards;
}

@keyframes sparkleAnim {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
}

/* hearts */
.heart {
    position: fixed;
    font-size: 18px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="mainMessage"></p>

<!-- 🎂 CAKE -->
<div class="cake" onclick="blowCandles()">

    <div class="layer bottom"></div>
    <div class="layer top"></div>

    <div class="cake-name" id="cakeName"></div>

    <div class="candle c1"><div class="flame"></div></div>
    <div class="candle c2"><div class="flame"></div></div>
    <div class="candle c3"><div class="flame"></div></div>

</div>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div class="hidden-message" id="message"></div>

<script>
// 👤 Name input
let friendName = prompt("Enter your name 💖") || "My Bestie 💕";

document.getElementById("title").innerHTML =
    `Happy Birthday ${friendName} 🎂💖`;

document.getElementById("mainMessage").innerHTML =
    `To ${friendName} 💕<br>
    You are one of the best people in my life ✨`;

document.getElementById("message").innerHTML =
    `Happy Birthday ${friendName} ❤️ Meeting you was one of the best things that happened to me. I’m really thankful to have you in my life. Wishing you all the happiness in the world 💕`;

document.getElementById("cakeName").innerHTML = friendName;

/* 🎁 surprise button */
function showMessage() {
    document.getElementById("message").style.display = "block";
    createConfetti();
    startFireworks();
}

/* 🎊 confetti */
function createConfetti() {
    const colors = ["#ff4d88", "#ffd166", "#06d6a0", "#118ab2", "#ff85a1"];

    for (let i = 0; i < 80; i++) {
        const c = document.createElement("div");
        c.classList.add("confetti");

        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
}

/* 🎆 fireworks */
function createFirework(x, y) {
    const colors = ["#ff4d88", "#ffd166", "#06d6a0", "#118ab2", "#ffffff"];

    for (let i = 0; i < 25; i++) {
        const fw = document.createElement("div");
        fw.classList.add("firework");

        fw.style.left = x + "px";
        fw.style.top = y + "px";
        fw.style.background = colors[Math.floor(Math.random() * colors.length)];

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 100;

        fw.style.transform =
            `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)`;

        document.body.appendChild(fw);
        setTimeout(() => fw.remove(), 1000);
    }
}

function startFireworks() {
    setInterval(() => {
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight / 2;
        createFirework(x, y);
    }, 800);
}

/* 🎂 blow candles */
function blowCandles() {
    document.querySelectorAll(".flame").forEach(f => f.classList.add("off"));
    document.body.classList.add("dimmed");
    startSparkles();

    alert("Make a wish 💖✨");
}

/* ✨ sparkles */
function startSparkles() {
    setInterval(() => {
        const s = document.createElement("div");
        s.classList.add("sparkle");

        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        s.style.animationDuration = (Math.random() * 2 + 1) + "s";

        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }, 150);
}

/* 💖 hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
